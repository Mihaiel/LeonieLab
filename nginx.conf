worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # gzip text assets — CSS/JS/HTML compress ~70%, video is already compressed
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Immutable hashed assets would cache forever — but these aren't
        # hashed, so use a moderate cache with revalidation.
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # Video: let the browser revalidate every time to avoid serving stale
        # footage after updates, but cache when unchanged.
        location ~* \.(mp4|webm)$ {
            expires 1d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # Pretty URL routing:
        # 1. Exact file (e.g. /favicon.ico)
        # 2. Directory with an index.html (e.g. /about/ → /about/index.html)
        # 3. Fall back to the 404 page
        location / {
            try_files $uri $uri/ =404;
        }

        # Direct requests to /404 or /404/ still return a 404 status code,
        # but error_page will then render the pretty page below.
        location = /404  { return 404; }
        location = /404/ { return 404; }

        # Serve the 404 page for any missed routes. The location is marked
        # `internal` so it can only be reached via error_page (subrequest),
        # never directly by a visitor — which keeps the status code honest.
        error_page 404 /404/index.html;
        location = /404/index.html {
            internal;
        }

        # Small hardening
        server_tokens off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
